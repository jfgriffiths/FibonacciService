name: GitHub Actions for Fibonacci Workflow
on: 
  push:  
    branches: 
      - main

permissions: 
  contents: read
  id-token: write

jobs:
  Build-job:
      uses: jfgriffiths/workflow-template/.github/workflows/deploy-dotnet-az-func.yml@main
      with: 
        dotnet-version: '10.0.x'
        project-path: 'FibonacciService/FibonacciService.csproj'
        function-name: 'svc-fibonacci'
        
